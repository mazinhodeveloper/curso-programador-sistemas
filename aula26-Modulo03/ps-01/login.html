<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #EDEBF4;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .login-card {
      background: #FFFFFF;
      border: 14px solid #544188;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #ffffff;
    }

    .login-title {
      margin-bottom: 1rem;
      color: #ffffff;
    }

    .form-control {
      background: #003566;
      border: none;
      color: #ffffff;
    }

    .form-control:focus {
      background: #003566;
      color: #ffffff;
      box-shadow: 0 0 0 0.2rem rgba(255, 195, 0, 0.25);
      border: 1px solid #ffc300;
    }

    .btn-custom {
      background: #ffc300;
      color: #000814;
      font-weight: bold;
      border: none;
    }

    .btn-custom:hover {
      background: #ffb703;
      color: #000814;
    }

    .small-text {
      color: #cccccc;
      font-size: 0.9rem;
    }

    .brand {
      color: #ffc300;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-card">

    <h3 class="login-title">
      <span class="brand">LOGIN</span>
    </h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Telefone">
      </div>

      <div class="mb-3">
        <label class="label">Senha</label>
        <input type="password" class="form-control" placeholder="Senha">
      </div>

      <button type="submit" class="btn btn-custom w-100">
        Entrar
      </button>
    </form>

      <div class="d-flex justify-content-between text-center mb-3">
        <div class="text-center">
          <a href="#" class="small-text" style="color:#ffc300;">Cadastro</a>
          <br>

        <a href="#" class="small-text" style="color:#ffc300;">Esqueci senha</a>
        </div>
      </div>

        

    <p class="text-center mt-3 small-text">
      © 2026 ZapTito
    </p>

  </div>

</body>
</html>
