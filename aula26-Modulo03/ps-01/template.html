<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #000814;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .login-card {
      background: #001d3d;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #ffffff;
    }

    .login-title {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }

    .form-control {
      background: #003566;
      border: none;
      color: #ffffff;
    }

    .form-control:focus {
      background: #003566;
      color: #ffffff;
      box-shadow: 0 0 0 0.2rem rgba(255, 195, 0, 0.25);
      border: 1px solid #ffc300;
    }

    .btn-custom {
      background: #ffc300;
      color: #000814;
      font-weight: bold;
      border: none;
    }

    .btn-custom:hover {
      background: #ffb703;
      color: #000814;
    }

    .small-text {
      color: #cccccc;
      font-size: 0.9rem;
    }

    .brand {
      color: #ffc300;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="login-card">

    <h3 class="login-title">
      Bem-vindo ao <span class="brand">MyWebApp</span>
    </h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Digite seu email">
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" placeholder="Digite sua senha">
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <input type="checkbox" id="remember">
          <label for="remember" class="small-text">Lembrar-me</label>
        </div>

        <a href="#" class="small-text" style="color:#ffc300;">Esqueci senha</a>
      </div>

      <button type="submit" class="btn btn-custom w-100">
        Entrar
      </button>
    </form>

    <p class="text-center mt-3 small-text">
      © 2026 MyWebApp
    </p>

  </div>

</body>
</html>
